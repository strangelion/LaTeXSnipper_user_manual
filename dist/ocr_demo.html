  html { background: var(--bg); }
  body { background: transparent; font-family: "Segoe UI","Noto Sans CJK SC","Microsoft YaHei",sans-serif; }
  .spacer-top { height: 60px; }
  .top-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--hdr-bg); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-bottom: 1px solid var(--border-color); }
  .top-nav .inner { max-width: var(--max-w); margin: 0 auto; padding: 0 1.25rem; height: 48px; display: flex; align-items: center; gap: 1rem; }

  .spinner { width: 18px; height: 18px; border: 2px solid var(--border-color); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
  .spinner.show { display: block; }

  .drop-zone { border: 2px dashed var(--border-color); border-radius: 16px; padding: 3rem 2rem; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--card-bg); margin-bottom: 1.5rem; }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: rgba(37,99,235,0.04); }
  .drop-zone input { display: none; }
  .drop-zone .icon { font-size: 3rem; margin-bottom: 0.5rem; }
  .drop-zone img { max-width: 100%; max-height: 300px; border-radius: 8px; }

  .result-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.5rem; display: none; }

  .confidence { font-size: 0.8rem; color: var(--muted); background: rgba(34,197,94,0.1); padding: 2px 10px; border-radius: 4px; }
  .copy-btn { background: var(--accent); color: #fff; border: none; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: background 0.2s; }
  .copy-btn:hover { background: var(--accent-hover); }
  .copy-btn.copied { background: #22c55e; }
  pre.result-code { background: #1e293b; color: #94a3b8; padding: 1rem 1.25rem; border-radius: 8px; overflow: auto; font-size: 0.9rem; font-family: "SF Mono","Cascadia Code","Consolas",monospace; white-space: pre-wrap; word-break: break-all; margin: 0; }

  .error-msg { color: #ef4444; font-size: 0.9rem; text-align: center; padding: 1rem; }

  .info-note { margin-top: 2rem; padding: 1rem; border-radius: 10px; background: var(--card-bg); border: 1px solid var(--border-color); font-size: 0.85rem; color: var(--muted); line-height: 1.7; }

  /* 进度条 */
  .progress-wrap { width: 100%; max-width: 400px; margin: 0 auto 1.5rem; display: none; }
  .progress-wrap.show { display: block; }
  .progress-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.35rem; }
  .progress-track { width: 100%; height: 8px; background: var(--border-color); border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #a78bfa); border-radius: 4px; transition: width 0.3s ease; width: 0%; }

  .usage-counter { text-align: center; font-size: 0.8rem; color: var(--muted); margin-top: -0.5rem; margin-bottom: 1rem; }

  @keyframes spin { to { transform: rotate(360deg); } }

  <div class="status-bar" id="statusBar">

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.all.min.js"></script>
<script>
(async function() {
  const MODEL_BASE = '/models/mathcraft-formula-rec';

  // DOM refs
  const statusIcon = document.getElementById('statusIcon');
  const statusText = document.getElementById('statusText');
  const spinner = document.getElementById('spinner');
  const modelProgress = document.getElementById('modelProgress');
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const preview = document.getElementById('preview');
  const dropContent = document.getElementById('dropContent');
  const resultCard = document.getElementById('resultCard');
  const resultCode = document.getElementById('resultCode');
  const confidence = document.getElementById('confidence');
  const copyBtn = document.getElementById('copyBtn');
  const errorMsg = document.getElementById('errorMsg');
  const progressWrap = document.getElementById('progressWrap');
  const progressFill = document.getElementById('progressFill');
  const progressFile = document.getElementById('progressFile');
  const progressPercent = document.getElementById('progressPercent');
  const usageCounter = document.getElementById('usageCounter');

  const ICONS = {
    loading: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
    ready: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
    processing: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
    done: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
    error: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
  };

  let encoderSession = null;
  let decoderSession = null;
  let tokenizerVocab = null;
  let decoderStartId = 2, eosId = 2, padId = 0;
  let ready = false;

  function setStatus(type, text, showSpin) {
    statusIcon.innerHTML = ICONS[type] || ICONS.loading;
    statusText.textContent = text;
    spinner.classList.toggle('show', showSpin);
  }

  function showError(msg) {
    errorMsg.style.display = 'block';
    errorMsg.textContent = msg;
    setStatus('error', '加载失败', false);
  }

  // ====== 设备指纹 + 使用次数限制 + 冷却 ======
  const DAILY_LIMIT = 20;
  const COOLDOWN_MS = 5000; // 两次识别之间至少间隔 5 秒
  let lastRecognitionTime = 0;
  function deviceFingerprint() {
    // 组合设备特征生成指纹，防止清 localStorage 绕过限制
    const parts = [
      navigator.hardwareConcurrency || 0,
      navigator.deviceMemory || 0,
      screen.width, screen.height, screen.colorDepth,
      navigator.language,
      navigator.platform,
    ];
    // 简单 hash
    let hash = 0;
    const str = parts.join('|');
    for (let i = 0; i < str.length; i++) {
      const c = str.charCodeAt(i);
      hash = ((hash << 5) - hash) + c;
      hash = hash | 0;
    }
    return 'dev_' + Math.abs(hash).toString(36);
  }
  function getUsage() {
    try {
      const key = 'ocr_usage_' + deviceFingerprint();
      const data = JSON.parse(localStorage.getItem(key) || '{}');
      const today = new Date().toDateString();
      if (data.date !== today) return { date: today, count: 0, device: deviceFingerprint() };
      return data;
    } catch(e) { return { date: new Date().toDateString(), count: 0 }; }
  }
  function incrementUsage() {
    const data = getUsage();
    data.count++;
    const key = 'ocr_usage_' + deviceFingerprint();
    localStorage.setItem(key, JSON.stringify(data));
    updateUsageDisplay();
  }
  function updateUsageDisplay() {
    const u = getUsage();
    const remaining = Math.max(0, DAILY_LIMIT - u.count);
    const pct = Math.round(u.count / DAILY_LIMIT * 100);
    usageCounter.innerHTML =
      '<span>今日剩余 <strong>' + remaining + '</strong> / ' + DAILY_LIMIT + ' 次</span>' +
      '<span style="margin-left:1rem;color:' + (remaining <= 5 ? '#ef4444' : 'var(--muted)') + ';">设备 ' + deviceFingerprint() + '</span>';
    if (remaining <= 0) {
      dropZone.style.opacity = '0.5';
      dropZone.style.pointerEvents = 'none';
      dropZone.title = '今日识别次数已用完';
      setStatus('error', '今日识别次数已用完，请明天再来', false);
    }
  }

  // ====== 带进度的下载 ======
  async function downloadWithProgress(url, label) {
    progressWrap.classList.add('show');
    progressFile.textContent = label;
    progressFill.style.width = '0%';
    progressPercent.textContent = '0%';

    const resp = await fetch(url);
    if (!resp.ok) throw new Error('下载失败: ' + url);
    const contentLength = parseInt(resp.headers.get('content-length') || '0', 10);
    const reader = resp.body.getReader();
    const chunks = [];
    let loaded = 0;

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
      loaded += value.length;
      if (contentLength > 0) {
        const pct = Math.round(loaded / contentLength * 100);
        progressFill.style.width = pct + '%';
        progressPercent.textContent = pct + '%';
        if (contentLength > 1024 * 1024) {
          progressFile.textContent = label + ' (' + (loaded / 1024 / 1024).toFixed(1) + ' / ' + (contentLength / 1024 / 1024).toFixed(1) + ' MB)';
        }
      } else {
        progressFile.textContent = label + ' (' + (loaded / 1024 / 1024).toFixed(1) + ' MB)';
      }
    }

    const blob = new Blob(chunks);
    const arrayBuffer = await blob.arrayBuffer();
    progressWrap.classList.remove('show');
    return arrayBuffer;
  }

  // ====== 加载模型（带进度条） ======
  async function loadModels() {
    try {
      // 下载编码器
      const encoderBuf = await downloadWithProgress(
        MODEL_BASE + '/encoder_model.onnx', '编码器模型'
      );
      setStatus('loading', '正在加载编码器到内存…', true);
      encoderSession = await ort.InferenceSession.create(encoderBuf, {
        executionProviders: ['wasm'],
        graphOptimizationLevel: 'all',
      });

      // 下载解码器
      const decoderBuf = await downloadWithProgress(
        MODEL_BASE + '/decoder_model.onnx', '解码器模型'
      );
      setStatus('loading', '正在加载解码器到内存…', true);
      decoderSession = await ort.InferenceSession.create(decoderBuf, {
        executionProviders: ['wasm'],
        graphOptimizationLevel: 'all',
      });
    } catch(e) {
      showError('模型加载失败: ' + (e.message || e));
      throw e;
    }
  }

  // ====== 加载分词器 ======
  async function loadTokenizer() {
    try {
      setStatus('loading', '正在加载分词器…', true);
      const resp = await fetch(MODEL_BASE + '/tokenizer.json');
      const data = await resp.json();
      const vocab = data.model.vocab;
      tokenizerVocab = {};
      for (const [token, id] of Object.entries(vocab)) {
        tokenizerVocab[id] = token;
      }

      try {
        const genResp = await fetch(MODEL_BASE + '/generation_config.json');
        const genData = await genResp.json();
        decoderStartId = genData.decoder_start_token_id || 2;
        eosId = genData.eos_token_id || 2;
        padId = genData.pad_token_id || 0;
      } catch(e) {}
    } catch(e) {
      showError('分词器加载失败: ' + (e.message || e));
      throw e;
    }
  }

  // ====== 图像预处理 ======
  function preprocessImage(img) {
    const canvas = document.createElement('canvas');
    canvas.width = 384;
    canvas.height = 384;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0, 384, 384);
    const pixels = ctx.getImageData(0, 0, 384, 384).data;

    const floatData = new Float32Array(1 * 3 * 384 * 384);
    const hw = 384 * 384;
    const scale = 2.0 / 255.0;
    for (let i = 0; i < hw; i++) {
      const src = i * 4;
      floatData[i] = pixels[src] * scale - 1.0;
      floatData[hw + i] = pixels[src + 1] * scale - 1.0;
      floatData[2 * hw + i] = pixels[src + 2] * scale - 1.0;
    }
    return floatData;
  }

  // ====== Softmax ======
  function softmax(arr) {
    const max = Math.max(...arr);
    const exp = arr.map(x => Math.exp(x - max));
    const sum = exp.reduce((a, b) => a + b, 0);
    return exp.map(x => x / sum);
  }

  // ====== 贪婪解码 ======
  function greedyDecode(logits) {
    const probs = softmax(logits);
    let maxIdx = 0, maxVal = probs[0];
    for (let i = 1; i < probs.length; i++) {
      if (probs[i] > maxVal) { maxVal = probs[i]; maxIdx = i; }
    }
    return { tokenId: maxIdx, prob: maxVal };
  }

  // ====== tokenizer 解码 ======
  function decodeTokens(tokenIds) {
    if (!tokenizerVocab) return tokenIds.join(', ');
    let text = '';
    for (const id of tokenIds) {
      const token = tokenizerVocab[id];
      if (!token) continue;
      if (token.startsWith('<') && token.endsWith('>')) continue;
      if (token.startsWith('Ġ')) { text += ' ' + token.slice(1); }
      else if (token.startsWith('▁')) { text += ' ' + token.slice(1); }
      else { text += token; }
    }
    return text.trim();
  }

  // ====== 识别 ======
  async function recognize(img) {
    if (!ready) throw new Error('模型尚未就绪');

    setStatus('processing', '正在识别公式…', true);
    errorMsg.style.display = 'none';

    const pixelValues = preprocessImage(img);
    const inputTensor = new ort.Tensor('float32', pixelValues, [1, 3, 384, 384]);

    const encName = encoderSession.inputNames[0];
    const encOut = await encoderSession.run({ [encName]: inputTensor });
    const hiddenStates = encOut[encoderSession.outputNames[0]];

    const decName0 = decoderSession.inputNames[0];
    const decName1 = decoderSession.inputNames[1];
    const maxTokens = 256;

    let inputIds = new ort.Tensor('int64', BigInt64Array.from([BigInt(decoderStartId)]), [1, 1]);
    const tokenIds = [];
    const tokenProbs = [];

    for (let step = 0; step < maxTokens; step++) {
      const decOut = await decoderSession.run({
        [decName0]: inputIds,
        [decName1]: hiddenStates,
      });

      const logits = decOut[decoderSession.outputNames[0]];
      const seqLen = logits.dims[1];
      const vocabSize = logits.dims[2];
      const offset = (seqLen - 1) * vocabSize;
      const lastLogits = Array.from(logits.data.slice(offset, offset + vocabSize));
      const res = greedyDecode(lastLogits);

      if (res.tokenId === eosId || res.tokenId === padId) break;
      tokenIds.push(res.tokenId);
      tokenProbs.push(res.prob);

      inputIds = new ort.Tensor('int64',
        BigInt64Array.from([...Array.from(inputIds.data), BigInt(res.tokenId)]),
        [1, seqLen + 1]
      );
    }

    const latex = decodeTokens(tokenIds);
    const avgConf = tokenProbs.length > 0
      ? tokenProbs.reduce((a, b) => a + b, 0) / tokenProbs.length : 0;

    return { latex, confidence: avgConf };
  }

  // ====== 初始化 ======
  async function init() {
    try {
      // 配置 WASM 后端
      ort.env.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/';
      ort.env.wasm.numThreads = 1;
      ort.env.wasm.simd = true;

      setStatus('loading', '正在加载分词器…', true);
      await loadTokenizer();

      setStatus('loading', '正在下载编码器模型 (84MB)…', true);
      await loadModels();

      ready = true;
      setStatus('ready', '模型就绪！拖入公式图片或 Ctrl+V 粘贴截图', false);
    } catch(e) {
      if (!errorMsg.style.display || errorMsg.style.display === 'none') {
        showError('初始化失败: ' + (e.message || e));
      }
    }
  }

  // ====== 处理图片 ======
  async function processImage(file) {
    if (!ready) { showError('模型尚未加载完成，请稍等'); return; }

    // 冷却检查
    const now = Date.now();
    if (now - lastRecognitionTime < COOLDOWN_MS) {
      const wait = Math.ceil((COOLDOWN_MS - (now - lastRecognitionTime)) / 1000);
      showError('请等待 ' + wait + ' 秒后再识别（防止资源滥用）');
      return;
    }

    // 次数检查
    const u = getUsage();
    if (u.count >= DAILY_LIMIT) {
      showError('今日识别次数已用完（' + DAILY_LIMIT + '次/天），请明天再来');
      return;
    }

    // 最小图片尺寸检查
    if (file.size < 1024) { showError('图片太小，请上传至少 1KB 的公式图片'); return; }

    // 预览
    const url = URL.createObjectURL(file);
    preview.src = url;
    preview.style.display = 'block';
    dropContent.style.display = 'none';
    resultCard.classList.remove('show');

    const img = new Image();
    img.onload = async function() {
      try {
        const result = await recognize(img);
        lastRecognitionTime = Date.now();
        incrementUsage();
        resultCode.textContent = result.latex;
        confidence.textContent = '置信度 ' + (result.confidence * 100).toFixed(1) + '%';
        resultCard.classList.add('show');
        setStatus('done', '识别完成', false);
      } catch(e) {
        showError('识别失败: ' + (e.message || e));
        setStatus('ready', '模型就绪！拖入公式图片开始识别', false);
      }
    };
    img.src = url;
  }

  // ====== UI 事件 ======
  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) processImage(file);
  });

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) processImage(file);
  });

  // 粘贴截图：Win+Shift+S / Cmd+Shift+4 截图后 Ctrl+V 直接识别
  document.addEventListener('paste', (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const file = item.getAsFile();
        if (file) processImage(file);
        return;
      }
    }
  });

  window.copyResult = function() {
    navigator.clipboard.writeText(resultCode.textContent).then(() => {
      copyBtn.textContent = '已复制';
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent = '复制 LaTeX'; copyBtn.classList.remove('copied'); }, 1500);
    });
  };

  // 启动
  init();
})();
</script>
</body>
</html>
