name: 同步 Release 到 R2

on:
  schedule:
    - cron: '7 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      should_sync: ${{ steps.decide.outputs.should_sync }}
      should_build_manual: ${{ steps.check_manual.outputs.manual_updated }}
    steps:
      - uses: actions/checkout@v4

      - name: 检查是否需要同步 Release
        id: decide
        run: |
          SHOULD="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD="true"
            echo "manual trigger, force sync"
            RELEASE=$(curl -sL --retry 2 -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/SakuraMathcraft/LaTeXSnipper/releases/tags/v2.3.2_Final_Stable")
            LATEST_ASSET=$(echo "$RELEASE" | jq -r '[.assets[].updated_at] | sort | last')
          else
            RELEASE=$(curl -sL --retry 2 -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/SakuraMathcraft/LaTeXSnipper/releases/tags/v2.3.2_Final_Stable")
            LATEST_ASSET=$(echo "$RELEASE" | jq -r '[.assets[].updated_at] | sort | last')
            if [ "$LATEST_ASSET" = "null" ] || [ -z "$LATEST_ASSET" ]; then
              echo "API response invalid, skip sync"
              LATEST_ASSET=""
            else
              echo "Latest asset: $LATEST_ASSET"
              if [ -f .release_state.json ]; then
                LAST=$(jq -r '.last_sync // empty' .release_state.json)
                echo "Last sync: $LAST"
                if [ "$LATEST_ASSET" != "$LAST" ]; then
                  SHOULD="true"
                  echo "Update detected"
                else
                  echo "No change, skip"
                fi
              else
                SHOULD="true"
                echo "First run, sync"
              fi
            fi
          fi
          echo "should_sync=$SHOULD" >> $GITHUB_OUTPUT
          if [ "$SHOULD" = "true" ] && [ -n "$LATEST_ASSET" ]; then
            echo "{\"last_sync\": \"$LATEST_ASSET\"}" > .release_state.json
          fi

      - name: 检查上游用户手册是否更新
        id: check_manual
        if: github.event_name == 'schedule'
        run: |
          echo "manual_updated=false" >> $GITHUB_OUTPUT
          UPSTREAM_SHA=$(curl -sL -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/SakuraMathcraft/LaTeXSnipper/contents/user_manual/user_manual.typ" \
            | jq -r '.sha')
          echo "Upstream SHA: $UPSTREAM_SHA"

          if [ -f .manual_state.json ]; then
            LAST_SHA=$(jq -r '.last_manual_sha // empty' .manual_state.json)
            echo "Last SHA: $LAST_SHA"
            if [ "$UPSTREAM_SHA" != "$LAST_SHA" ] && [ "$UPSTREAM_SHA" != "null" ]; then
              echo "manual_updated=true" >> $GITHUB_OUTPUT
              echo "Manual updated!"
            fi
          fi

          if [ "$UPSTREAM_SHA" != "null" ] && [ -n "$UPSTREAM_SHA" ]; then
            echo "{\"last_manual_sha\": \"$UPSTREAM_SHA\"}" > .manual_state.json
          fi

      - name: 保存状态文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          CHANGED=false
          git add .release_state.json 2>/dev/null || true
          git add .manual_state.json 2>/dev/null || true
          git diff --staged --quiet || CHANGED=true
          if [ "$CHANGED" = "true" ]; then
            git commit -m "chore: update sync state"
            git pull --rebase && git push
          fi

  sync:
    needs: check
    if: needs.check.outputs.should_sync == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: 下载并上传 R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          mkdir -p .sync_tmp
          declare -A ASSETS=(
            ["LaTeXSnipperSetup-2.3.2.exe"]="LaTeXSnipperSetup-2.3.2.exe"
            ["latexsnipper_2.3.2_amd64.deb"]="latexsnipper_2.3.2_amd64.deb"
            ["LaTeXSnipper_2.3.2_arm64.dmg"]="LaTeXSnipper_2.3.2_arm64.dmg"
            ["LaTeXSnipper_User_Manual.pdf"]="LaTeXSnipper_Manual.pdf"
          )
          for NAME in "${!ASSETS[@]}"; do
            R2KEY="${ASSETS[$NAME]}"
            URL="https://github.com/SakuraMathcraft/LaTeXSnipper/releases/download/v2.3.2_Final_Stable/$NAME"
            echo "download $NAME"
            curl -sL "$URL" -o ".sync_tmp/$NAME"
            SHA=$(sha256sum ".sync_tmp/$NAME" | cut -d' ' -f1)
            echo "  SHA256: $SHA"
            npx wrangler r2 object delete "release/$R2KEY" --remote 2>/dev/null || true
            npx wrangler r2 object put "release/$R2KEY" --file ".sync_tmp/$NAME" --remote
            echo "$R2KEY:$SHA" >> /tmp/sha256.txt
          done
          rm -rf .sync_tmp

      - name: 更新 download.html SHA256
        run: |
          python3 << 'PYEOF'
          import re

          sha_map = {}
          with open('/tmp/sha256.txt', 'r') as f:
              for line in f:
                  r2name, sha = line.strip().split(':')
                  sha_map[r2name] = sha

          pairs = [
              ('LaTeXSnipperSetup-2.3.2.exe',  sha_map.get('LaTeXSnipperSetup-2.3.2.exe', '')),
              ('latexsnipper_2.3.2_amd64.deb', sha_map.get('latexsnipper_2.3.2_amd64.deb', '')),
              ('LaTeXSnipper_2.3.2_arm64.dmg', sha_map.get('LaTeXSnipper_2.3.2_arm64.dmg', '')),
          ]

          def update_file(filepath):
              with open(filepath, 'r', encoding='utf-8') as f:
                  html = f.read()
              changed = False
              for filename, sha in pairs:
                  if not sha: continue
                  escaped = re.escape(filename)
                  cur_match = re.search(
                      r'<a\s+class="download-btn"\s+href="[^"]*' + escaped + r'"[^>]*>[^<]*</a>\s*<p\s+class="sha256"\s+data-sha256="([^"]*)"',
                      html
                  )
                  if cur_match and cur_match.group(1) == sha:
                      print(f"  {filepath}: {filename} already correct")
                      continue
                  pattern = re.compile(
                      r'(<a\s+class="download-btn"\s+href="[^"]*' + escaped + r'"[^>]*>[^<]*</a>\s*<p\s+class="sha256"\s+data-sha256=")[^"]*(")',
                  )
                  new_html = pattern.sub(r'\g<1>' + sha + r'\g<2>', html)
                  if new_html != html:
                      html = new_html
                      changed = True
                      print(f"  {filepath}: {filename} sha256 updated")
                  else:
                      print(f"  {filepath}: {filename} no_match")
              if changed:
                  with open(filepath, 'w', encoding='utf-8') as f:
                      f.write(html)
              return changed

          c1 = update_file('download.html')
          c2 = update_file('dist/download.html')
          PYEOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add download.html dist/download.html
          git diff --staged --quiet || (git commit -m "chore: sync release SHA256" && git pull --rebase && git push)

  build-manual:
    needs: check
    if: needs.check.outputs.should_build_manual == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 触发用户手册构建
        run: |
          curl -sL -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/build-manual.yml/dispatches" \
            -d '{"ref":"master"}'
          echo "Triggered build-manual workflow"
