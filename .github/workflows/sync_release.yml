name: 同步 Release 到 R2

on:
  schedule:
    - cron: '7 3 * * *'  # 每天一次 (UTC 3:07)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_sync: ${{ steps.decide.outputs.should_sync }}
    steps:
      - uses: actions/checkout@v4

      - name: 检查是否需要同步
        id: decide
        run: |
          SHOULD="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SHOULD="true"
            echo "manual trigger, force sync"
          else
            RELEASE=$(curl -sL --retry 2 -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/SakuraMathcraft/LaTeXSnipper/releases/tags/v2.3.2_Final_Stable")
            PUBLISHED=$(echo "$RELEASE" | jq -r '.published_at')
            # 校验 API 响应有效（published_at 必须是合法时间戳）
            if [ "$PUBLISHED" = "null" ] || [ -z "$PUBLISHED" ]; then
              echo "API response invalid, skip sync"
              PUBLISHED=""
            else
              echo "Release published: $PUBLISHED"
              if [ -f .release_state.json ]; then
                LAST=$(jq -r '.last_sync // empty' .release_state.json)
                echo "Last sync: $LAST"
                if [ "$PUBLISHED" != "$LAST" ]; then
                  SHOULD="true"
                  echo "Update detected"
                else
                  echo "No change, skip"
                fi
              else
                SHOULD="true"
                echo "First run, sync"
              fi
            fi
          fi
          echo "should_sync=$SHOULD" >> $GITHUB_OUTPUT
          # 仅在确认同步后更新状态文件
          if [ "$SHOULD" = "true" ] && [ -n "$PUBLISHED" ]; then
            echo "$RELEASE" | jq -r '{last_sync: .published_at}' > .release_state.json
          fi

      - name: 保存状态文件
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .release_state.json
          git diff --staged --quiet || (git commit -m "chore: update sync state" && git pull --rebase && git push)

  sync:
    needs: check
    if: needs.check.outputs.should_sync == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 下载并上传 R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          mkdir -p .sync_tmp
          declare -A ASSETS=(
            ["LaTeXSnipperSetup-2.3.2.exe"]="LaTeXSnipperSetup-2.3.2.exe"
            ["latexsnipper_2.3.2_amd64.deb"]="latexsnipper_2.3.2_amd64.deb"
            ["LaTeXSnipper_2.3.2_arm64.dmg"]="LaTeXSnipper_2.3.2_arm64.dmg"
            ["LaTeXSnipper_User_Manual.pdf"]="LaTeXSnipper_Manual.pdf"
          )
          for NAME in "${!ASSETS[@]}"; do
            R2KEY="${ASSETS[$NAME]}"
            URL="https://github.com/SakuraMathcraft/LaTeXSnipper/releases/download/v2.3.2_Final_Stable/$NAME"
            echo "download $NAME"
            curl -sL "$URL" -o ".sync_tmp/$NAME"
            SHA=$(sha256sum ".sync_tmp/$NAME" | cut -d' ' -f1)
            echo "  SHA256: $SHA"
            npx wrangler r2 object delete "release/$R2KEY" --remote 2>/dev/null || true
            npx wrangler r2 object put "release/$R2KEY" --file ".sync_tmp/$NAME" --remote
            echo "$R2KEY:$SHA" >> /tmp/sha256.txt
          done
          rm -rf .sync_tmp

      - name: 更新 download.html SHA256
        run: |
          python3 << 'PYEOF'
          import re

          sha_map = {}
          with open('/tmp/sha256.txt', 'r') as f:
              for line in f:
                  r2name, sha = line.strip().split(':')
                  sha_map[r2name] = sha

          pairs = [
              ('LaTeXSnipperSetup-2.3.2.exe',  sha_map.get('LaTeXSnipperSetup-2.3.2.exe', '')),
              ('latexsnipper_2.3.2_amd64.deb', sha_map.get('latexsnipper_2.3.2_amd64.deb', '')),
              ('LaTeXSnipper_2.3.2_arm64.dmg', sha_map.get('LaTeXSnipper_2.3.2_arm64.dmg', '')),
          ]

          def update_file(filepath):
              with open(filepath, 'r', encoding='utf-8') as f:
                  html = f.read()
              changed = False
              for filename, sha in pairs:
                  if not sha: continue
                  escaped = re.escape(filename)
                  cur_match = re.search(
                      r'<a\s+class="download-btn"\s+href="[^"]*' + escaped + r'"[^>]*>[^<]*</a>\s*<p\s+class="sha256"\s+data-sha256="([^"]*)"',
                      html
                  )
                  if cur_match and cur_match.group(1) == sha:
                      print(f"  {filepath}: {filename} already correct")
                      continue
                  pattern = re.compile(
                      r'(<a\s+class="download-btn"\s+href="[^"]*' + escaped + r'"[^>]*>[^<]*</a>\s*<p\s+class="sha256"\s+data-sha256=")[^"]*(")',
                  )
                  new_html = pattern.sub(r'\g<1>' + sha + r'\g<2>', html)
                  if new_html != html:
                      html = new_html
                      changed = True
                      print(f"  {filepath}: {filename} sha256 updated")
                  else:
                      print(f"  {filepath}: {filename} no_match")
              if changed:
                  with open(filepath, 'w', encoding='utf-8') as f:
                      f.write(html)
              return changed

          c1 = update_file('download.html')
          c2 = update_file('dist/download.html')
          PYEOF

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add download.html dist/download.html
          git diff --staged --quiet || (git commit -m "chore: sync release SHA256" && git pull --rebase && git push)
